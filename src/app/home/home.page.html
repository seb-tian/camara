<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title> Mi Cámara App</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="camera-container">
   
    <ion-button expand="block" color="secondary" (click)="tomarFoto()" class="camera-button">
      <ion-icon name="camera" slot="start"></ion-icon>
      Capturar imagen
    </ion-button>

    <div *ngIf="foto" class="preview-section">
      <ion-card class="photo-card">
        <ion-card-header>
          <ion-card-title> Foto capturada</ion-card-title>
        </ion-card-header>
        
        <ion-img [src]="foto" alt="Foto capturada"></ion-img>
        
        <ion-card-content>
          <ion-icon name="checkmark-circle" color="success"></ion-icon>
          Imagen capturada con éxito. Puedes guardarla o compartirla.
        </ion-card-content>
      </ion-card>

      <ion-button expand="block" fill="outline" (click)="limpiarFoto()" color="medium">
        <ion-icon name="trash" slot="start"></ion-icon>
        Limpiar foto
      </ion-button>
    </div>

    <div *ngIf="!foto" class="empty-state">
      <ion-icon name="images-outline" class="empty-icon"></ion-icon>
      <p>No hay fotos capturadas aún</p>
      <small>Presiona el botón para tomar una foto</small>
    </div>
  </div>
</ion-content>
